name: Bluesky Auto Poster

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      account_row:
        description: >
          OPTIONAL. Leave this blank to let the script auto-claim the next
          free (not "In Use") row in Sheet1 and permanently bind it to this
          repo (ASSIGNED_REPO / ASSIGNED_STATUS columns). Only fill this in
          if you want to force this run onto one specific row number,
          overriding auto-assignment (e.g. "3" = third data row after the
          header). All other settings (ratios, hashtags, links, report,
          etc.) live in Sheet1/Settings and are re-read every posting cycle.
        required: false
        default: ""

concurrency:
  group: bluesky-poster
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib atproto Pillow requests beautifulsoup4

      - name: Run poster loop
        run: python -u postnow_status_post.py
        env:
          PYTHONUNBUFFERED: "1"
          # Token URL is hardcoded inside postnow_status_post.py — nothing
          # to configure here.
          #
          # IMPORTANT: no "|| '1'" fallback here on purpose. If neither a
          # manual input nor a repo variable is set, ACCOUNT_ROW resolves to
          # an EMPTY string, which the script treats as "not explicitly
          # set" -> it falls through to auto-assignment (claims the first
          # free row and remembers it for this repo forever after).
          #
          # If you want to permanently pin THIS repo to a specific row
          # instead of relying on auto-assignment, set a repo variable:
          #   Settings -> Secrets and variables -> Actions -> Variables
          #   -> New repository variable -> ACCOUNT_ROW = 3
          # A manual workflow_dispatch input, if filled in, wins over both.
          ACCOUNT_ROW: ${{ github.event.inputs.account_row || vars.ACCOUNT_ROW }}

      - name: Disable workflow on permanent failure
        if: failure()
        run: gh workflow disable "${{ github.workflow }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
